name: Self Update Slack Export Viewer Version

on:
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

jobs:
  update-viewer-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get current and latest package versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          current_version=$(grep -oP 'slack-export-viewer==\K[^" ]+' Dockerfile)
          latest_version=$(python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen('https://pypi.org/pypi/slack-export-viewer/json', timeout=30) as resp:
              data = json.load(resp)

          print(data['info']['version'])
          PY
          )

          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "latest=$latest_version" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile pin
        if: steps.versions.outputs.current != steps.versions.outputs.latest
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s/slack-export-viewer==${{ steps.versions.outputs.current }}/slack-export-viewer==${{ steps.versions.outputs.latest }}/" Dockerfile

      - name: Create pull request
        if: steps.versions.outputs.current != steps.versions.outputs.latest
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-sev-version
          delete-branch: true
          commit-message: "chore: bump slack-export-viewer to ${{ steps.versions.outputs.latest }}"
          title: "chore: bump slack-export-viewer to ${{ steps.versions.outputs.latest }}"
          body: |
            Automated update of the pinned slack-export-viewer version in Dockerfile.

            - Current: ${{ steps.versions.outputs.current }}
            - Latest:  ${{ steps.versions.outputs.latest }}

            This PR was created by the self-update workflow.

      - name: No update needed
        if: steps.versions.outputs.current == steps.versions.outputs.latest
        run: echo "Already on latest version (${{ steps.versions.outputs.current }})"

  update-uploader-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Check for outdated uploader dependencies
        id: deps
        shell: bash
        run: |
          set -euo pipefail

          cd uploader
          cp requirements.txt requirements.txt.orig

          # Resolve latest compatible versions from unpinned package names
          sed 's/==.*//' requirements.txt > requirements.in
          pip-compile --no-header --strip-extras -o requirements.txt.new requirements.in

          # Keep only the package==version lines (drop comments/blank lines for comparison)
          grep -E '^[a-zA-Z]' requirements.txt.orig | sort > /tmp/old.txt
          grep -E '^[a-zA-Z]' requirements.txt.new  | sort > /tmp/new.txt

          if diff -q /tmp/old.txt /tmp/new.txt > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            cp requirements.txt.new requirements.txt
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "diff<<EOF" >> "$GITHUB_OUTPUT"
            diff /tmp/old.txt /tmp/new.txt >> "$GITHUB_OUTPUT" || true
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
          rm -f requirements.txt.orig requirements.txt.new requirements.in

      - name: Create pull request
        if: steps.deps.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/update-uploader-deps
          delete-branch: true
          commit-message: "chore: update uploader pip dependencies"
          title: "chore: update uploader pip dependencies"
          body: |
            Automated update of pinned pip dependencies in `uploader/requirements.txt`.

            ```diff
            ${{ steps.deps.outputs.diff }}
            ```

            This PR was created by the self-update workflow.

      - name: No update needed
        if: steps.deps.outputs.changed == 'false'
        run: echo "Uploader dependencies are already up to date"
