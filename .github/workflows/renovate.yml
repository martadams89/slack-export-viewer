name: Renovate

# Self-hosted Renovate — no third-party GitHub App. Runs on a schedule (and on
# demand), opens dependency PRs, and auto-merges the safe ones once the
# required checks pass.
#
# Setup (one-time):
#   1. RENOVATE_TOKEN repo secret: fine-grained PAT (this repo only) with
#      Read+Write on Contents, Pull requests, Workflows. PRs opened with the
#      default GITHUB_TOKEN would not trigger CI, so required checks would
#      never pass and nothing would auto-merge.
#   2. Repo Settings → General → allow auto-merge.
#   3. Branch protection / ruleset on main → require status check: "uploader".
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        default: info
        type: choice
        options: [info, debug]

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.18
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_REQUIRE_CONFIG: required
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
